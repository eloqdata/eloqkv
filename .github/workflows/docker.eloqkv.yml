name: EloqKV Docker 

on:
  workflow_dispatch:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  eloqkv:
    uses: ./.github/workflows/docker.template.yml
    with:
      dockerfile: ./scripts/docker/eloqkv.docker
      image-name: eloqkv
      checkout-submodules: "false"
      # Fetch product + third-party sources on the runner (has .git);
      # the ubuntu-dev-based build stage in eloqkv.docker only compiles them.
      checkout-command: |
        bash scripts/checkout_product_submodules.sh
        bash data_substrate/scripts/third_party/fetch.sh
    secrets: inherit
