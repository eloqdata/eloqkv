name: Release

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version tag (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  # One job per arch; build.yml builds third-party once and then all variants.
  call-build:
    name: ${{ matrix.arch }}
    uses: ./.github/workflows/build.yml
    with:
      tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
      arch: ${{ matrix.arch }}
      os_id: ubuntu24
      package_manager: apt
      container_image: eloqdata/ubuntu-dev:24.04
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
